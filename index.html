<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product preview card component</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <div class="perfume-img">
      <picture>
        <source media="(max-width: 767px)" srcset="images/image-product-mobile.jpg">
        <source media="(min-width: 768px)" srcset="images/image-product-desktop.jpg">

        <img src="images/image-product-mobile.jpg" alt="Image of perfume bottle" >
      </picture>
    </div>
    <div class="content">
      <p class="topic">P E R F U M E</p>
      <h1 class="brand-name">Gabrielle Essence Eau De Parfum</h1>
      <p class="description">
        A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.
      </p>
      <div class="prices">
        <p class="now">$149.99</p>
        <p class="before"><del>$169.99</del></p>
      </div>
      <div class="button">
        <img src="images/icon-cart.svg" alt="shopping-cart-icon">
        <p class="btn-text">Add to Cart</p>
      </div>
    </div>

  </main>

</body>
</html>
